<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NFC Review Plate Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>NFC Review Plate Tracker</h1>
      <p class="subtitle">Track QR code &amp; NFC scans for your review plates</p>
    </header>

    <section class="stats-grid" id="summaryCards">
      <div class="stat-card"><span class="stat-label">Total Scans</span><span class="stat-value" id="totalScans">—</span></div>
      <div class="stat-card"><span class="stat-label">Today</span><span class="stat-value" id="todayScans">—</span></div>
      <div class="stat-card qr"><span class="stat-label">QR Scans</span><span class="stat-value" id="qrScans">—</span></div>
      <div class="stat-card nfc"><span class="stat-label">NFC Scans</span><span class="stat-value" id="nfcScans">—</span></div>
      <div class="stat-card"><span class="stat-label">Active Plates</span><span class="stat-value" id="activePlates">—</span></div>
    </section>

    <section class="row">
      <div class="card chart-card">
        <h2>Scan Timeline</h2>
        <canvas id="timelineChart"></canvas>
      </div>
      <div class="card chart-card">
        <h2>QR vs NFC</h2>
        <canvas id="pieChart"></canvas>
      </div>
    </section>

    <section class="card">
      <div class="card-header">
        <h2>Review Plates</h2>
        <button class="btn" id="addPlateBtn">+ Add Plate</button>
      </div>
      <div class="add-form" id="addForm" style="display:none;">
        <input type="text" id="businessName" placeholder="Business name" required>
        <input type="url" id="mapsUrl" placeholder="Google Maps review URL" required>
        <button class="btn btn-primary" id="savePlateBtn">Save</button>
        <button class="btn btn-secondary" id="cancelAddBtn">Cancel</button>
      </div>
      <div class="table-wrap">
        <table id="platesTable">
          <thead><tr><th>Business</th><th>QR Scans</th><th>NFC Scans</th><th>Total</th><th>Actions</th></tr></thead>
          <tbody id="platesBody"></tbody>
        </table>
      </div>
    </section>

    <!-- Plate Details Modal -->
    <div class="modal-overlay" id="modal" style="display:none;">
      <div class="modal">
        <div class="modal-header">
          <h2 id="modalTitle">Plate Details</h2>
          <button class="btn-close" id="closeModal">&times;</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
